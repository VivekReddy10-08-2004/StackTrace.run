# StackTrace.run — local stack in one command:  docker compose up --build
#
#   backend  -> http://localhost:8000   (Flask app via waitress)
#   frontend -> http://localhost:4321   (static files)
#
# Secrets/config come from your git-ignored env files (DATABASE_URL,
# TURSO_AUTH_TOKEN, JWT_SECRET, GitHub creds, …). With DATABASE_URL set the
# backend uses Turso; unset it to fall back to a local SQLite file.

services:
  backend:
    build:
      context: ./backend
    image: stacktrace-backend
    ports:
      - "8000:7860"
    env_file:
      - ./backend/.env
      - ./project.env
    restart: unless-stopped

  # Optional: serve the static frontend for local parity. In production you'd
  # host these files on a CDN/static host (Vercel, Netlify, Cloudflare Pages).
  frontend:
    image: python:3.12-slim
    working_dir: /site
    command: ["python", "-m", "http.server", "4321"]
    volumes:
      - ./:/site:ro
    ports:
      - "4321:4321"
    depends_on:
      - backend
    restart: unless-stopped
